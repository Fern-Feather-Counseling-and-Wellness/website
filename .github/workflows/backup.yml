name: Weekly Backup

on:
  schedule:
    # Runs every Sunday at 6:00 UTC (2:00 AM EST)
    - cron: '0 6 * * 0'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for complete backup

      - name: Create backup archive
        run: |
          DATE=$(date +'%Y-%m-%d')
          zip -r "website-backup-${DATE}.zip" . -x ".git/*"
          echo "BACKUP_DATE=${DATE}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: backup-${{ env.BACKUP_DATE }}
          name: "Website Backup - ${{ env.BACKUP_DATE }}"
          files: website-backup-*.zip
          prerelease: false