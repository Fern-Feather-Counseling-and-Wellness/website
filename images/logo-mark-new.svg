<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Light background -->
  <circle cx="50" cy="50" r="45" fill="#e8f5e9"/>
  
  <!-- Feather - right side, curved with barbs -->
  <path d="M65 15 Q80 30 75 55 Q70 80 50 90 Q45 85 48 75" fill="#f0e68c" stroke="#d4a574" stroke-width="1"/>
  <!-- Feather rachis (central shaft) -->
  <path d="M60 20 Q70 40 60 75" stroke="#c9a86c" stroke-width="2" fill="none"/>
  <!-- Feather barbs -->
  <path d="M60 25 Q68 28 72 32" stroke="#d4a574" stroke-width="1" fill="none"/>
  <path d="M58 35 Q66 38 70 42" stroke="#d4a574" stroke-width="1" fill="none"/>
  <path d="M56 45 Q64 48 68 52" stroke="#d4a574" stroke-width="1" fill="none"/>
  <path d="M54 55 Q60 58 62 62" stroke="#d4a574" stroke-width="1" fill="none"/>
  
  <!-- Fern - left side, classic fern leaf shape -->
  <path d="M40 85 Q25 75 20 55 Q15 35 30 25 Q35 30 38 40 Q32 35 28 30 Q35 22 45 20 Q50 25 48 35 Q52 30 55 28 Q62 25 65 30 Q70 40 65 55 Q60 70 50 80" 
        fill="#4a9c5d"/>
  <!-- Fern stem curve -->
  <path d="M42 82 Q30 65 30 45" stroke="#2d6b3a" stroke-width="2" fill="none"/>
</svg>